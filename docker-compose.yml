services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grosery
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/grosery?schema=public
      JWT_ACCESS_SECRET: change_me_to_a_long_random_secret
      JWT_ACCESS_EXPIRES_IN: 8h
      JWT_REFRESH_SECRET: change_me_to_another_long_random_secret
      JWT_REFRESH_EXPIRES_IN: 30d
      PASSWORD_RESET_EXPIRES_MINUTES: 15
      BCRYPT_SALT_ROUNDS: 12
    ports:
      - '4000:4000'

volumes:
  postgres_data:
